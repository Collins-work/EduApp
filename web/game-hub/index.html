<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="aurora" aria-hidden="true"></div>
    <main class="hub">
        <header class="top">
            <p class="tag">Mini Games</p>
            <h1>Game Hub Dashboard</h1>
            <p>Pick a game, play a fast challenge, and send your score back into Telegram.</p>
        </header>

        <section id="game-list" class="grid"></section>

        <section class="play-panel">
            <p class="tag">Now Playing</p>
            <h2 id="active-game-title">Choose a game</h2>
            <p id="active-game-description" class="muted">Select any card above to play inside Telegram.</p>

            <div class="question-box">
                <p id="round-label" class="round-label">Round not started</p>
                <p id="game-prompt" class="prompt">Tap a game card to begin.</p>
            </div>

            <div id="game-options" class="options"></div>

            <div class="play-actions">
                <button id="next-round" class="btn secondary">Next Round</button>
            </div>
        </section>

        <section class="score-panel">
            <label for="score-input">Score to submit</label>
            <input id="score-input" type="number" min="0" value="5" />
            <button id="submit-game-score" class="btn">Submit To Group</button>
            <p id="status" class="status"></p>
        </section>
    </main>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="./app.js"></script>
</body>

</html>
