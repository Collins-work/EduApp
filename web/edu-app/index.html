<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edu Mini App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="app-shell">
      <section class="panel hero">
        <p class="eyebrow">Telegram Mini App</p>
        <h1>Flashcards + Quiz Arena</h1>
        <p class="subtitle">Practice fast, submit scores to your group instantly.</p>
      </section>

      <section class="panel card-panel">
        <h2>Flashcards</h2>
        <p id="flashcard-question" class="question"></p>
        <p id="flashcard-answer" class="answer hidden"></p>
        <div class="row">
          <button id="next-card" class="btn btn-primary">Next Card</button>
          <button id="show-answer" class="btn btn-ghost">Show Answer</button>
        </div>
      </section>

      <section class="panel quiz-panel">
        <h2>Quick Quiz</h2>
        <p id="quiz-question" class="question"></p>
        <div id="quiz-choices" class="choices"></div>
        <input id="answer-input" class="input" placeholder="Type answer or choice letter" />
        <div class="row">
          <button id="submit-answer" class="btn btn-primary">Submit Answer</button>
          <button id="new-quiz" class="btn btn-ghost">New Question</button>
        </div>
        <p id="quiz-feedback" class="feedback"></p>
      </section>

      <section class="panel actions">
        <button id="send-results" class="btn btn-accent">Send Score To Group</button>
      </section>
    </main>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
